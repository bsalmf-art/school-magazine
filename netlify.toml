[build]
  base = "frontend"
  publish = "build"
  command = "yarn install && yarn build"

[build.environment]
  NODE_VERSION = "20"
  REACT_APP_BACKEND_URL = ""

[[redirects]]
  from = "/api/*"
  to = "https://school-magazine.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
